# cargo-deny config for nat. Mirrors the citrate-compute-pool / citrate-comms
# supply-chain posture: `cargo audit` BLOCKS a stable release (no soft-fail);
# accepted advisories are explicit, reviewed `[advisories] ignore` entries here,
# each citing a REM tracker — never a continue-on-error CI step.
#
# This file is the audit trail. Adding a license or accepting an advisory is a
# PR that edits this file, forcing a reviewer to confirm it is safe.

[advisories]
version = 2
yanked = "deny"
ignore = [
    # paste: unmaintained (no successor needed). It is a compile-time-only proc-macro
    # (token pasting) pulled transitively by candle / gemm; it emits no runtime code and
    # has no known vulnerability — an "unmaintained" notice, not a security advisory.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
confidence-threshold = 0.8
# Smallest set that permits the current dependency graph. Adding a license is a
# reviewed PR. BUSL-1.1 is the Licensed Work's own license (see LICENSE).
allow = [
    "BUSL-1.1",        # the Licensed Work's own license (see LICENSE); applies to every nat-* crate
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",    # zerocopy
    "Unicode-3.0",     # unicode-ident
    "ISC",             # libloading (candle-cuda's dynamic CUDA-library loader); permissive, OSI-approved
]

[bans]
multiple-versions = "warn"
# Deny wildcard ("*") version requirements on EXTERNAL crates (a supply-chain
# footgun), but allow them for internal workspace path deps — `nat-x.workspace =
# true` resolves to a path dep with no version req, which is not a risk.
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# The audited deterministic boundary kernel (Gate-4 WP-W0) is the one allowed git
# dependency — a CitrateNetwork-owned, rev-pinned, BUSL-licensed internal crate.
[sources.allow-org]
github = ["CitrateNetwork"]
