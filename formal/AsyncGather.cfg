\* TLC config for AsyncGather. A small finite model: three zones, a short
\* deadline. Checks the safety invariants and the liveness property.
SPECIFICATION Spec

CONSTANTS
  Zones = {z1, z2, z3}
  Deadline = 3

INVARIANT TypeOK
INVARIANT Consistent
INVARIANT StragglerRecorded
INVARIANT NoPendingAtClose

PROPERTY WindowCloses
