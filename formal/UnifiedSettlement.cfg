\* TLC config for UnifiedSettlement. Three accepted nodes with distinct weights;
\* TLC explores every settlement order and checks conservation + state-root
\* independence on each, plus the AllSettled liveness under weak fairness.
\* Weight/Quality are overridden via `<-` (TLC cfg cannot hold a function literal).
SPECIFICATION Spec

CONSTANTS
  Nodes = {1, 2, 3}
  Weight <- WeightFcn
  Quality <- QualityFcn

INVARIANT TypeOK
INVARIANT ConservationInProgress
INVARIANT ConservationAtClose
INVARIANT NoPhantomPayout
INVARIANT StateRootIndependent

PROPERTY AllSettled
