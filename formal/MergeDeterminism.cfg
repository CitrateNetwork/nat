\* TLC config for MergeDeterminism. Five zones with distinct-ish scores, keep the
\* top 1 (mirrors the default prune_threshold 0.8 over a 5-zone gathered set).
\* TLC enumerates every nonempty gathered subset and checks the invariants on each.
SPECIFICATION Spec

CONSTANTS
  N = 5
  KeepCount = 1
  Score <- ScoreFcn

INVARIANT TypeOK
INVARIANT PruneCorrect
INVARIANT TraceComplete
INVARIANT DeterministicDecision
INVARIANT NoRankTies
