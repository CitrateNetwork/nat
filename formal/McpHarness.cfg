\* TLC config for McpHarness. The constants are fixed per run; check the safety
\* invariants and the liveness property. To cover the decision space, run TLC
\* across the combinations of PreconditionsMet/Approved/CodecResult (the Rust
\* test gate2_mcp_harness.rs walks the same cartesian product at runtime).
SPECIFICATION Spec

CONSTANTS
  PreconditionsMet = TRUE
  Approved = TRUE
  CodecResult = "pass"

INVARIANT TypeOK
INVARIANT NoUngatedSideEffect
INVARIANT NoExecOnFailedCodec

PROPERTY AlwaysReturns
