\* TLC config for GradientAggregationAdversarial. Four workers, value domain 0..4,
\* trim one per end (β=1), at most one Byzantine worker (f=1, so β>=f holds),
\* honest band [2,3]. TLC enumerates mode assignments (≤1 Byzantine), every honest
\* in-band + Byzantine free submission, checks the robustness invariants on the
\* committed aggregate, and the WindowCloses liveness under weak fairness.
SPECIFICATION Spec

CONSTANTS
  N = 4
  V = 4
  TrimCount = 1
  MaxByzantine = 1
  HonestLo = 2
  HonestHi = 3

INVARIANT TypeOK
INVARIANT ByzantineCannotFlipUnderHonestDominance
INVARIANT HonestUnanimityPreserved
INVARIANT NoSpontaneousEscape

PROPERTY WindowCloses
