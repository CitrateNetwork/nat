\* TLC config for GradientAggregation. Four workers, value domain 0..4, trim one
\* extreme from each end (so the kept band is N-2*TrimCount = 2 workers). TLC
\* enumerates every [Workers -> 0..4] submission assignment (625) and checks the
\* determinism + trim-budget + range invariants on each.
SPECIFICATION Spec

CONSTANTS
  N = 4
  V = 4
  TrimCount = 1

INVARIANT TypeOK
INVARIANT DeterministicAggregation
INVARIANT NoRankTies
INVARIANT TrimBudgetExact
INVARIANT AggWithinRange
INVARIANT StateRootIndependent
